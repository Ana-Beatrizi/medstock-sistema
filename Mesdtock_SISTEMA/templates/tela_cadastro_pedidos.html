<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Pedidos</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='tela_cadastro_pedidos.css') }}">

</head>
<body>


    <!-- Conteúdo principal -->
    <form action="{{ url_for('salvar_pedido', produto_id = produto.id) }}" method="POST">
        <input type="text" name="produto_id" value="{{ produto.id }}">
        <input type="text" name="fornecedor_id" value="{{ produto.fornecedor_id }}">
        <input type="text" name="tipo" value="{{ tipo }}">
    <div class="conteudo">

        <div class="card">

            <h1>Pedido Fornecedor</h1>


            <div class="linha">
                <div>
                    <label>Quantidade</label>
                    <input type="number" name="quantidade"
                     value="{{ pedido.quantidade_estoque if pedido else '' }}" required>
                </div>

                    <div>
                        <label for="data_pedido">Data Do Pedido</label>
                        <input type="datetime-local" name="data_pedido"
                         value="{{ pedido.data_pedido if pedido else '' }}">
                    </div>
                
            </div>

            

            <div class="linha" id="line_valor">
                <div>
                    <label>Observação</label>
                    <input type="text" name="observacao"
                     value="{{ pedido.observacao if pedido else '' }}">
                </div>

            </div>

            <button type="submit">Adicionar</button>
        </div>
    </div>
</form>

</body>
</html>
