{% extends 'tela_home.html' %}

{% block conteudo %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='tela_cadastro_de_fornecedor.css') }}">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Ícones -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Fonte moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <div class="container d-flex align-items-center justify-content-center cadastro container">
        <div class="cadastro-card text-center">

            <h2 class="mb-3 text-dark">Cadastro Fornecedor</h2>

            <form method="POST" action="{{ url_for('salvar_fornecedor') }}" id="cadastro-form">

                <div class="mb-3 text-start">
                    <label class="form-label text-dark">Nome</label>
                    <div class="input-group">

                        <input type="text" name="nome_fornecedor" id="nome" class="form-control" required>
                    </div>
                </div>

                <div class="mb-3 text-start">
                    <label class="form-label text-dark">Email</label>
                    <div class="input-group">

                        <input type="email" name="email" id="email" class="form-control" required>
                    </div>
                </div>


                <div class="mb-3 text-start">
                    <label class="form-label text-dark">CNPJ</label>
                    <div class="input-group">

                        <!--implementar api externa para validar cnpj posteriormente-->
                        <input type="text" name="cnpj" id="cnpj" class="form-control" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-cadastro w-100 text-white mt-2">Cadastrar</button>
            </form>


        </div>
    </div>
    {% endblock %}
