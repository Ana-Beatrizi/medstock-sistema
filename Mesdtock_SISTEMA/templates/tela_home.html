<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | MEDSTOCK</title>

    <link rel="icon" href="{{ url_for('static', filename='favicon.png') }}">  

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='tela_home.css') }}">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Ícones -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Fonte -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

    <!-- NAVBAR -->

    <header class="navbar">

        <!-- LADO ESQUERDO -->

        <div class="left-navbar">

            <!-- BOTÃO MENU -->

            <button id="btn-menu" class="btn-menu">
                <i class="bi bi-list"></i>
            </button>

            <!-- LOGO -->

            <div class="logo">
                <img src="{{ url_for('static', filename='img/medstock_logo_sf.png') }}" alt="">
                <h1 id="h1-logo">MEDSTOCK</h1>
            </div>

        </div>

        <!-- MENU -->

        <ul class="menu">
            <li><a href="#">Fornecedor</a></li>
            <li><a href="#">Cliente</a></li>
        </ul>

        <!-- ÍCONES -->

        <div class="icones">

            <i class="bi bi-bell"></i>

            <a href="{{ url_for('tela_perfil_do_usuario', id=cliente.id) }}">
                <i class="bi bi-person"></i>
            </a>

        </div>

    </header>

    <!-- SIDEBAR -->

    <nav class="sidebar" id="sidebar">

        <ul>

            <li>
                <a href="{{ url_for('tela_home') }}">
                    <i class="bi bi-house"></i>
                    <span>Home</span>
                </a>
            </li>

            <li>
                <a href="{{ url_for('tela_produtos') }}">
                    <i class="bi bi-box-seam"></i>
                    <span>Gestão de Estoque</span>
                </a>
            </li>

            <li>
                <a href="{{ url_for('tela_cadastro_produto') }}">
                    <i class="bi bi-plus-square"></i>
                    <span>Cadastro de Produtos</span>
                </a>
            </li>

            <li>
                <a href="{{ url_for('tela_entrada') }}">
                    <i class="bi bi-arrow-down-circle"></i>
                    <span>Entrada</span>
                </a>
            </li>

            <li>
                <a href="#">
                    <i class="bi bi-arrow-up-circle"></i>
                    <span>Saída</span>
                </a>
            </li>

            <li>
                <a href="#">
                    <i class="bi bi-clock-history"></i>
                    <span>Histórico</span>
                </a>
            </li>

        </ul>

    </nav>

    <!-- CONTEÚDO -->

    <main class="conteudo" id="conteudo">

        {% block conteudo %}{% endblock %}

    </main>

    <!-- SCRIPT -->

    <script>

        const btnMenu = document.getElementById("btn-menu");
        const sidebar = document.getElementById("sidebar");
        const conteudo = document.getElementById("conteudo");

        btnMenu.addEventListener("click", () => {

            sidebar.classList.toggle("close");
            conteudo.classList.toggle("expand");

        });

    </script>

</body>
</html>
