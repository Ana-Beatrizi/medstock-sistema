{% extends 'tela_home.html' %}

{% block conteudo %}
    <title>Document</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tela_perfil_do_usuario.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <div class="container d-flex align-items-center justify-content-center cadastro container">
        <div class="cadastro-card text-center">
            <div id="icone">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2c/Default_pfp.svg/500px-Default_pfp.svg.png" alt="">
            </div>
            <form action="" id="cadastro-form">
                <div class="mb-3 text-start">
                    <label class="form-label text-dark">Nome: <p>{{ cliente.nome }}</p></label>
                    <div class="input-group">
                    </div>
                </div>
<div class="mb-3 text-start">
                    <label class="form-label text-dark">Email: <p>{{ cliente.email }}</p></label>
                </div>
<div class="mb-3 text-start">
                    <label class="form-label text-dark">CPF: <p>{{ cliente.cpf }}</p></label>
                </div>
<a href="{{ url_for('logout') }}" class="btn btn-cadastro w-100 text-white mt-2">Sair</a>
<a href="{{ url_for('logout2') }}" class="btn btn-cadastro w-100 text-white mt-2">Entre com outra conta</a>
            </form>
        </div>
    </div>
    {% endblock %}
